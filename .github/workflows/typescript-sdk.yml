name: TypeScript SDK CI

on:
  push:
    paths:
      - "sdk/typescript/**"
      - ".github/workflows/typescript-sdk.yml"
  pull_request:
    paths:
      - "sdk/typescript/**"
      - ".github/workflows/typescript-sdk.yml"

jobs:
  test:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sdk/typescript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
